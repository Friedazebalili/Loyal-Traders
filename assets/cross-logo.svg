<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="crossGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4d4d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8a8a8;stop-opacity:1" />
    </radialGradient>
    <filter id="crossShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#crossGradient)" stroke="#8b8b8b" stroke-width="2" filter="url(#crossShadow)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#e8e8e8" stroke-width="1" opacity="0.6"/>
  
  <!-- Vertical bar of cross -->
  <rect x="85" y="40" width="30" height="120" fill="url(#crossGradient)" stroke="#7a7a7a" stroke-width="1.5"/>
  
  <!-- Horizontal bar of cross -->
  <rect x="40" y="85" width="120" height="30" fill="url(#crossGradient)" stroke="#7a7a7a" stroke-width="1.5"/>
  
  <!-- Highlight on vertical bar -->
  <rect x="87" y="42" width="8" height="116" fill="#ffffff" opacity="0.4" rx="2"/>
  
  <!-- Highlight on horizontal bar -->
  <rect x="42" y="87" width="116" height="8" fill="#ffffff" opacity="0.4" ry="2"/>
</svg>